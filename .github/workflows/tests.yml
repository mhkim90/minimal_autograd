name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          git init -q
          git remote add origin "https://github.com/${REPO}.git"
          git fetch --depth 1 origin "${SHA}"
          git checkout -q FETCH_HEAD
      - name: Install dependencies
        run: sudo apt-get install -y libeigen3-dev
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
      - name: Run tests
        run: |
          cd build
          ./test_core
          ./test_nn
          ./test_conv
      - name: Build advanced tests
        run: |
          mkdir build-advanced && cd build-advanced
          cmake .. -DCMAKE_BUILD_TYPE=Release -DAUTOGRAD_BUILD_ADVANCED_OPS=ON
          make -j$(nproc)
      - name: Run advanced tests
        run: |
          cd build-advanced
          ./test_extensions
          ./test_diffusion
          ./test_smoke
